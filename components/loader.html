<div id="loader-wrapper">
    <canvas id="loader-canvas"></canvas>
    
    <div class="loader-content">
        <div class="tech-loader">
            <div class="ring-outer"></div>
            <div class="ring-inner"></div>
            
            <!-- Icono SVG en lugar de la imagen para la pantalla de carga -->
            <svg class="loader-icon" viewBox="0 0 24 24" fill="none" stroke="#FF9000" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"></path>
            </svg>
        </div>
        
        <!-- Texto del loader con 'techno' en blanco y 'mode' en naranja -->
        <div class="loader-text gs-loader-reveal">
            <span class="main">techno<span class="highlight">mode</span></span>
        </div>

        <div class="loader-progress-container">
            <div class="loader-progress-bar" id="loader-progress-fill"></div>
        </div>
    </div>
</div>
